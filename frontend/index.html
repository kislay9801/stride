<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Stride · Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/theme.js"></script>
<script>/* Hide until auth resolves to avoid a flash before redirect; fail-safe reveal after 4s. */
document.documentElement.style.visibility='hidden';setTimeout(function(){document.documentElement.style.visibility=''},4000);</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface">
<div id="app-shell"></div>

<main class="ml-0 lg:ml-64 mt-16 p-lg md:p-xl min-h-[calc(100vh-64px)]">
  <div class="max-w-container-max mx-auto space-y-xl">
    <!-- Welcome Header -->
    <section class="flex justify-between items-end">
      <div>
        <h2 id="greeting" class="font-display text-headline-lg md:text-display text-primary">Good morning</h2>
        <p id="greeting-sub" class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Loading your day…</p>
      </div>
      <div id="goals-pill" class="hidden lg:flex gap-sm"></div>
    </section>

    <div class="grid grid-cols-12 gap-lg">
      <!-- Daily Timeline -->
      <div class="col-span-12 lg:col-span-8 bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/10">
        <div class="flex justify-between items-center mb-xl">
          <h3 class="font-headline-md text-headline-md text-primary">Daily Timeline</h3>
          <span id="today-label" class="font-bold text-primary text-label-sm"></span>
        </div>
        <div id="timeline" class="space-y-0 ml-4 relative">
          <div class="absolute left-6 top-0 bottom-0 w-0.5 border-l-2 border-dashed border-primary-container/50"></div>
        </div>
      </div>

      <!-- Cognitive Load Ring -->
      <div class="col-span-12 lg:col-span-4 bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/10 flex flex-col items-center justify-center">
        <h3 class="font-headline-md text-headline-md text-primary mb-xl w-full text-left">Cognitive Load</h3>
        <div class="relative w-48 h-48 flex items-center justify-center mb-lg">
          <svg class="w-full h-full transform -rotate-90">
            <circle class="text-surface-container-high" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-width="8"></circle>
            <circle id="capacity-arc" class="text-primary capacity-ring" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-dasharray="552.92" stroke-dashoffset="552.92" stroke-linecap="round" stroke-width="8"></circle>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
            <span id="capacity-value" class="font-display text-headline-lg text-primary">—</span>
            <span class="font-label-sm text-label-sm text-on-surface-variant">Current Load</span>
          </div>
        </div>
        <div class="text-center">
          <p id="capacity-note" class="font-body-md text-body-md text-on-surface-variant mb-md px-md"></p>
          <div id="capacity-badge" class="inline-flex items-center gap-xs px-md py-xs bg-secondary-container/20 text-secondary rounded-full">
            <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
            <span class="font-label-sm text-label-sm font-bold uppercase tracking-wider">Optimal State</span>
          </div>
        </div>
      </div>

      <!-- Weekly Impact -->
      <div class="col-span-12 lg:col-span-7 bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/10">
        <div class="flex justify-between items-center mb-xl">
          <h3 class="font-headline-md text-headline-md text-primary">Weekly Impact</h3>
        </div>
        <div id="weekly-chart" class="grid grid-cols-7 gap-md h-40 items-end px-md"></div>
        <div id="weekly-stats" class="grid grid-cols-3 gap-lg mt-xl pt-xl border-t border-outline-variant/10"></div>
      </div>

      <!-- AI Insight + Coming Up -->
      <div class="col-span-12 lg:col-span-5 flex flex-col gap-lg">
        <div class="flex-1 bg-primary-container text-on-primary-container rounded-xl p-lg relative overflow-hidden">
          <div class="relative z-10">
            <div class="flex items-center gap-md mb-md">
              <div class="bg-white/20 p-sm rounded-lg backdrop-blur-md"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span></div>
              <h3 class="font-headline-md text-headline-md font-bold">AI Insight</h3>
            </div>
            <p id="ai-insight" class="font-body-md text-body-md leading-relaxed mb-lg">Loading insight…</p>
            <button id="regen-insight" class="bg-on-primary-container text-white px-lg py-sm rounded-full font-label-md text-label-md transition-transform hover:scale-105 active:scale-95 flex items-center gap-sm">
              <span class="material-symbols-outlined text-sm">auto_awesome</span> New Insight
            </button>
          </div>
          <div class="absolute -right-12 -bottom-12 w-48 h-48 bg-secondary-fixed-dim/30 rounded-full blur-3xl"></div>
        </div>
        <div class="bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/10">
          <h3 class="font-label-md text-label-md text-primary uppercase tracking-widest mb-md">Coming Up</h3>
          <div id="coming-up" class="space-y-md"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<button id="fab" class="fixed bottom-lg right-lg w-14 h-14 rounded-full bg-primary text-white flex items-center justify-center shadow-xl hover:scale-110 active:scale-95 transition-all z-50">
  <span class="material-symbols-outlined" style="font-size: 32px;">add</span>
</button>

<!-- Add Task Modal -->
<div id="task-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-md bg-black/40 backdrop-blur-sm">
  <div class="bg-surface-container-lowest rounded-xl p-xl w-full max-w-md shadow-2xl fade-in">
    <div class="flex items-center justify-between mb-lg">
      <h3 class="font-headline-md text-headline-md text-primary">New Task</h3>
      <button type="button" id="task-close" class="material-symbols-outlined text-on-surface-variant hover:text-on-surface p-xs rounded-full hover:bg-surface-container-high">close</button>
    </div>
    <form id="task-form" class="space-y-md">
      <div>
        <label class="block text-label-sm text-on-surface-variant mb-xs">Title</label>
        <input id="task-title" required class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-lg py-md font-body-md focus:ring-2 focus:ring-primary/20" placeholder="e.g. Review Chapter 4"/>
      </div>
      <div>
        <label class="block text-label-sm text-on-surface-variant mb-xs">Description <span class="opacity-60">(optional)</span></label>
        <input id="task-desc" class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-lg py-md font-body-md focus:ring-2 focus:ring-primary/20" placeholder="A short note"/>
      </div>
      <div class="grid grid-cols-2 gap-md">
        <div>
          <label class="block text-label-sm text-on-surface-variant mb-xs">Start <span class="opacity-60">(optional)</span></label>
          <input id="task-start" class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-lg py-md font-body-md focus:ring-2 focus:ring-primary/20" placeholder="9:00 AM"/>
        </div>
        <div>
          <label class="block text-label-sm text-on-surface-variant mb-xs">End <span class="opacity-60">(optional)</span></label>
          <input id="task-end" class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-lg py-md font-body-md focus:ring-2 focus:ring-primary/20" placeholder="10:30 AM"/>
        </div>
      </div>
      <div>
        <label class="block text-label-sm text-on-surface-variant mb-xs">Icon</label>
        <div id="task-icons" class="flex flex-wrap gap-sm"></div>
      </div>
      <div class="flex justify-end gap-sm pt-sm">
        <button type="button" id="task-cancel" class="px-lg py-md rounded-full border border-outline-variant font-label-md hover:bg-surface-container-low transition-colors">Cancel</button>
        <button type="submit" id="task-submit" class="px-lg py-md rounded-full bg-primary text-on-primary font-label-md hover:opacity-90 active:scale-95 transition-all">Add Task</button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="/assets/firebase-config.js"></script>
<script src="/assets/auth.js"></script>
<script src="/assets/common.js"></script>
<script src="/assets/dashboard.js"></script>
</body>
</html>
